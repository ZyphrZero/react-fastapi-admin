# =============================================================================
# React FastAPI Admin Docker Compose - Local Directory Version
# =============================================================================
# This configuration uses local directories for data persistence, making it
# easy to migrate the whole deployment directory to another server.
#
# Quick Start:
#   1. Copy .env.example to .env
#   2. mkdir -p storage logs postgres_data
#   3. docker compose --env-file .env -f docker-compose.local.yml up -d
#
# Frontend:
#   Deploy the frontend separately as a static site.
#   Your external gateway / reverse proxy should route:
#     - /api, /docs, /redoc, /openapi.json, /health, /static -> this API service
# =============================================================================

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: react-fastapi-admin-api
    restart: unless-stopped
    ports:
      - "${BIND_HOST:-0.0.0.0}:${APP_PORT:-9999}:9999"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9999/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: react-fastapi-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-react_fastapi_admin}
      PGDATA: /var/lib/postgresql/data
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  bootstrap:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: react-fastapi-admin-bootstrap
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app", "bootstrap"]
    profiles: ["ops"]

  upgrade:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: react-fastapi-admin-upgrade
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app", "db", "upgrade"]
    profiles: ["ops"]

